services:
  api:
    build:
      context: ./apps/api
    container_name: sidangready-api
    environment:
      APP_NAME: SidangReady AI API
      ENVIRONMENT: development
      API_PREFIX: /api
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sidangready:sid4ngr3ady@postgres:5432/sidangready}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: sidangready-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sidangready}
      POSTGRES_USER: ${POSTGRES_USER:-sidangready}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sid4ngr3ady}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sidangready-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
